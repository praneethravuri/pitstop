[project]
name = "pitstop"
version = "0.2.0"
description = "All-in-one F1 MCP Server"
readme = "README.md"
requires-python = ">=3.13"
authors = [{ name = "Praneeth Ravuri", email = "praneeth@tuskira.ai" }]
license = { text = "MIT" }
dependencies = [
    "fastmcp==2.12.5",
    "fastf1==3.7.0",
    "pydantic==2.11.10",
    "httpx[http2]==0.28.1",
    "feedparser==6.0.12",
    "python-dotenv==1.1.1",
    "hishel==1.3.0",
    "tenacity==9.1.4",
    "uvloop==0.22.1",
    "orjson==3.11.9",
]

[project.scripts]
pitstop = "pitstop.server:main"

[dependency-groups]
dev = [
    "pytest==8.4.1",
    "pytest-asyncio==0.24.0",
    "pytest-httpx==0.35.0",
    "ruff==0.11.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pitstop"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]
